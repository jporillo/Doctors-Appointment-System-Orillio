<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zeus Clinic - Delete Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .field-error {
            color: #e05c8a;
            font-size: 12px;
            margin-top: -8px;
            margin-bottom: 6px;
            text-align: left;
        }
        input.invalid {
            border: 2px solid #e05c8a !important;
        }
        .warning-box {
            background: #fff0f5;
            border: 1.5px solid #f9a8d4;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #e05c8a;
            text-align: center;
        }
        .warning-box strong {
            display: block;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .section-label {
            font-size: 11px;
            color: #f9a8d4;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .delete-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f9a8d4, #ec4899);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.03em;
        }
        .delete-btn:hover {
            background: linear-gradient(135deg, #ec4899, #be185d);
        }
    </style>
</head>
<body>

<div class="heart">❤</div>
<div class="heart">❤</div>
<div class="heart">❤</div>
<div class="heart">❤</div>
<div class="heart">❤</div>
<div class="heart">❤</div>

<div class="container">

    <h1>Delete Account 🗑️</h1>
    <div class="subtitle">Zeus's Clinic</div>

    <div class="warning-box">
        <strong>⚠ Are you sure?</strong>
        This will permanently delete your account and all your data. This cannot be undone.
    </div>

    {% if verify_error %}
        <p class="field-error" style="text-align:center;">{{ verify_error }}</p>
    {% endif %}

    <form method="POST" action="/delete">

        <p class="section-label">✦ Confirm Your Identity</p>

        <input type="password" name="verify_password"
               placeholder="Enter your current password"
               class="{{ 'invalid' if verify_error else '' }}">

        <br>

        <button type="submit" class="delete-btn">Yes, Delete My Account</button>
    </form>

    <div class="login" style="margin-top: 14px;">
        <a href="{{ url_for('home') }}">&#8592; Back to Home</a>
    </div>

</div>

</body>
</html>
